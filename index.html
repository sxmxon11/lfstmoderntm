<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void SMP | Official Minecraft Server</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="navbar liquid-glass">
        <div class="nav-container">
            <img src="voidsmp.png" alt="Void SMP Logo" class="nav-logo">
            <nav>
                <ul class="nav-links">
                    <li><a href="#home" class="active">Home</a></li>
                    <li><a href="#features">Features</a></li>
                    <li><a href="#status">Server Status</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section id="home" class="hero">
        <div class="hero-content">
            <img src="voidsmp.png" alt="Void SMP Logo" class="hero-logo">
            <p class="hero-subtitle">A unique survival experience in the endless void.</p>
            
            <div class="ip-wrapper">
                <div class="ip-container liquid-glass">
                    <div class="ip-info">
                        <span class="ip-label"><i class="fab fa-java"></i> Java Edition</span>
                        <span class="ip-text">lifesteal.moderntm.de</span>
                    </div>
                    <button class="btn-copy" onclick="copyIP('lifesteal.moderntm.de', this)"><i class="far fa-copy"></i> Copy</button>
                </div>
            </div>
        </div>
    </section>

    <section id="status" class="status-section">
        <div class="status-card liquid-glass">
            <h2>Server Status</h2>
            <div class="status-indicator">
                <span class="pulse-dot" id="pulse-dot"></span>
                <span id="server-status-text">Loading...</span>
            </div>
            <p class="player-count"><strong id="player-count">0</strong> players online</p>
            <p class="version">Version: 1.20.X - 1.21</p>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Void SMP. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
